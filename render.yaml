services:
  - type: web
    name: royalpet-backend
    env: node
    rootDir: server
    buildCommand: cd ../client && npm ci && npm run build && cd ../server && npm ci && npm run migrate
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300
      - key: ALLOW_BULK_SYNC
        value: true
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_PUBLIC_BASE_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false

databases:
  - name: royalpet-db
    region: oregon
    databaseName: royalpet
    plan: starter
    version: 15
